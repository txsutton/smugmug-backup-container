services:
  smugmug-sync:
    image: smugmug-sync-pro:latest
    container_name: smugmug_backup
    read_only: true        # Locks the container filesystem
    tmpfs:
      - /tmp               # Gives Python a place for temporary files
    env_file: .env         # Loads API_KEY, API_SECRET, ACCESS_TOKEN, ACCESS_SECRET, NICKNAME
    environment:
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - /volume2/Photos/smugmug-backup:/data
    # sync.py is a batch job that exits when done.
    # Only restart on unexpected failures, and cap retries so we don't hammer the API.
    restart: on-failure:3
